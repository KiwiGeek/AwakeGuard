name: XP LOL build

on:
  push:
    branches: [master, release]
    paths:
      - "AwakeGuard-xp-lol/**"
      - "assets/**"
      - "scripts/generate-icons.py"
      - ".github/workflows/xp-lol.yml"
  pull_request:
    paths:
      - "AwakeGuard-xp-lol/**"
      - "assets/**"
      - "scripts/generate-icons.py"
      - ".github/workflows/xp-lol.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-xp-lol:
    name: AwakeGuard XP LOL (i686)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install MinGW i686
        run: |
          sudo apt-get update
          sudo apt-get install -y g++-mingw-w64-i686-w64-mingw32

      - name: Ensure icons exist
        run: |
          if [ ! -f assets/AwakeGuard.ico ]; then
            sudo apt-get install -y python3-pil
            python3 scripts/generate-icons.py
          fi

      - name: Configure and build
        working-directory: AwakeGuard-xp-lol
        run: |
          cmake -S . -B build -DCMAKE_TOOLCHAIN_FILE=cmake/mingw-i686-xp.cmake
          cmake --build build --config Release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AwakeGuard-win32-x86-xp-lol
          path: AwakeGuard-xp-lol/build/AwakeGuard-XP-LOL.exe
          if-no-files-found: error
