name: Release

on:
  push:
    branches: [release]
  workflow_dispatch:

permissions:
  contents: write

env:
  DOTNET_NOLOGO: "true"
  DOTNET_CLI_TELEMETRY_OPTOUT: "true"
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: "true"

jobs:
  # ---------------------------------------------------------------------------
  # 1. Native Win32 (C++17) — single .exe, no dependencies
  # ---------------------------------------------------------------------------
  build-win32:
    name: Build native Win32 (x64)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build (Release | x64)
        working-directory: AwakeGuard-win32
        run: msbuild AwakeGuard.sln /p:Configuration=Release /p:Platform=x64 /m /nologo

      - name: Stage artifact
        shell: pwsh
        run: |
          $src = "AwakeGuard-win32/bin/Release/AwakeGuard.exe"
          if (-not (Test-Path $src)) {
            $src = (Get-ChildItem -Path AwakeGuard-win32 -Recurse -Filter AwakeGuard.exe | Select-Object -First 1).FullName
          }
          if (-not $src) { throw "Could not locate AwakeGuard.exe after build." }
          New-Item -ItemType Directory -Path artifacts -Force | Out-Null
          Copy-Item $src "artifacts/AwakeGuard-win32-x64.exe" -Force
          Get-ChildItem artifacts | Format-Table -AutoSize

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AwakeGuard-win32-x64
          path: artifacts/AwakeGuard-win32-x64.exe
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # 2. WPF .NET 10 — framework-dependent (needs .NET 10 Desktop Runtime)
  # ---------------------------------------------------------------------------
  build-wpf-framework-dependent:
    name: Build WPF (.NET 10, framework-dependent)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Publish (framework-dependent, win-x64)
        working-directory: AwakeGuard
        run: >
          dotnet publish AwakeGuard.csproj
          -c Release
          -r win-x64
          --self-contained false
          -p:PublishSingleFile=true
          -p:DebugType=embedded
          -o publish/framework-dependent

      - name: Package artifact
        shell: pwsh
        run: |
          $publishDir = "AwakeGuard/publish/framework-dependent"
          if (-not (Test-Path $publishDir)) { throw "Publish output missing at $publishDir" }
          New-Item -ItemType Directory -Path artifacts -Force | Out-Null
          $zip = "artifacts/AwakeGuard-wpf-framework-dependent-win-x64.zip"
          Compress-Archive -Path "$publishDir/*" -DestinationPath $zip -Force
          Get-ChildItem artifacts | Format-Table -AutoSize

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AwakeGuard-wpf-framework-dependent-win-x64
          path: artifacts/AwakeGuard-wpf-framework-dependent-win-x64.zip
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # 3. WPF .NET 10 — self-contained single file (no .NET install needed)
  # ---------------------------------------------------------------------------
  build-wpf-self-contained:
    name: Build WPF (.NET 10, self-contained)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Publish (self-contained, win-x64)
        working-directory: AwakeGuard
        run: >
          dotnet publish AwakeGuard.csproj
          -c Release
          -r win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:EnableCompressionInSingleFile=true
          -p:DebugType=embedded
          -o publish/self-contained

      - name: Package artifact
        shell: pwsh
        run: |
          $publishDir = "AwakeGuard/publish/self-contained"
          if (-not (Test-Path $publishDir)) { throw "Publish output missing at $publishDir" }
          New-Item -ItemType Directory -Path artifacts -Force | Out-Null
          $zip = "artifacts/AwakeGuard-wpf-self-contained-win-x64.zip"
          Compress-Archive -Path "$publishDir/*" -DestinationPath $zip -Force
          Get-ChildItem artifacts | Format-Table -AutoSize

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AwakeGuard-wpf-self-contained-win-x64
          path: artifacts/AwakeGuard-wpf-self-contained-win-x64.zip
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # 4. Publish a GitHub Release with all three artifacts attached
  # ---------------------------------------------------------------------------
  release:
    name: Publish GitHub Release
    needs:
      - build-win32
      - build-wpf-framework-dependent
      - build-wpf-self-contained
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifact tree
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-files
          find artifacts -type f \( -name '*.exe' -o -name '*.zip' \) -exec cp -v {} release-files/ \;
          ls -la release-files

      - name: Compute release metadata
        id: meta
        shell: bash
        run: |
          tag="build-$(date -u +%Y%m%d-%H%M%S)-${GITHUB_SHA::7}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "name=AwakeGuard $tag" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.name }}
          generate_release_notes: true
          files: release-files/*
          draft: false
          prerelease: false
