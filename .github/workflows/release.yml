name: Release

on:
  push:
    branches: [release]
  workflow_dispatch:

permissions:
  contents: write

env:
  DOTNET_NOLOGO: "true"
  DOTNET_CLI_TELEMETRY_OPTOUT: "true"
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: "true"

jobs:
  # ---------------------------------------------------------------------------
  # Require an exact SemVer tag (vX.Y.Z) on release branch HEAD; version flows to all builds.
  # ---------------------------------------------------------------------------
  resolve-version:
    name: Resolve version from tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      semver: ${{ steps.version.outputs.semver }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Require version tag at HEAD
        id: version
        shell: bash
        run: |
          set -euo pipefail

          if [ "${GITHUB_REF}" != "refs/heads/release" ]; then
            echo "::error::Release builds must run on the release branch (got ${GITHUB_REF})."
            exit 1
          fi

          tag="$(git describe --exact-match --tags HEAD 2>/dev/null || true)"
          if [ -z "$tag" ]; then
            echo "::error::release branch HEAD must have an exact version tag (e.g. v0.1.1) before fast-forward."
            echo "::error::Tag master, push the tag, then fast-forward release to that commit."
            exit 1
          fi

          case "$tag" in
            v[0-9]*.[0-9]*.[0-9]*)
              semver="${tag#v}"
              ;;
            *)
              echo "::error::Version tag must look like vMAJOR.MINOR.PATCH (got ${tag})."
              exit 1
              ;;
          esac

          if ! [[ "$semver" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Tag ${tag} did not resolve to a three-part version (got ${semver})."
            exit 1
          fi

          echo "Resolved ${tag} -> ${semver}"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "semver=${semver}" >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------------------
  # 1. Native Win32 (C++17) — single .exe, no dependencies. Matrix: x64/x86/arm64.
  # ---------------------------------------------------------------------------
  build-win32:
    name: Native Win32 (${{ matrix.arch }})
    needs: resolve-version
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            platform: x64
          - arch: x86
            platform: Win32
          - arch: arm64
            platform: ARM64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build (Release | ${{ matrix.platform }})
        working-directory: AwakeGuard-win32
        run: >
          msbuild AwakeGuard.sln
          /p:Configuration=Release
          /p:Platform=${{ matrix.platform }}
          /p:AwakeGuardVersion=${{ needs.resolve-version.outputs.semver }}
          /m /nologo

      - name: Stage artifact
        shell: pwsh
        run: |
          $src = "AwakeGuard-win32/bin/${{ matrix.platform }}/Release/AwakeGuard.exe"
          if (-not (Test-Path $src)) {
            Write-Host "Did not find $src. Build tree:"
            Get-ChildItem -Path AwakeGuard-win32 -Recurse -Filter AwakeGuard.exe | ForEach-Object { Write-Host "  $($_.FullName)" }
            throw "AwakeGuard.exe not found for platform ${{ matrix.platform }}"
          }
          New-Item -ItemType Directory -Path artifacts -Force | Out-Null
          Copy-Item $src "artifacts/AwakeGuard-win32-${{ matrix.arch }}.exe" -Force
          Get-ChildItem artifacts | Format-Table -AutoSize

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AwakeGuard-win32-${{ matrix.arch }}
          path: artifacts/AwakeGuard-win32-${{ matrix.arch }}.exe
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # 2. XP LOL (MinGW i686) — 32-bit only, for Windows XP (museum build).
  # ---------------------------------------------------------------------------
  build-xp-lol:
    name: XP LOL (WinXP i686)
    needs: resolve-version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install MinGW i686 and Pillow
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc-mingw-w64-i686-win32 \
            g++-mingw-w64-i686-win32 \
            binutils-mingw-w64-i686 \
            python3-pil

      - name: Generate XP-compatible icons (BMP ICO, not PNG-in-ICO)
        run: python3 scripts/generate-icons.py

      - name: Configure and build
        working-directory: AwakeGuard-xp-lol
        run: |
          cmake -S . -B build \
            -DCMAKE_TOOLCHAIN_FILE=cmake/mingw-i686-xp.cmake \
            -DAWAKEGUARD_VERSION=${{ needs.resolve-version.outputs.semver }}
          cmake --build build --config Release

      - name: Stage artifact
        shell: bash
        run: |
          set -euo pipefail
          src="AwakeGuard-xp-lol/build/AwakeGuard-XP-LOL.exe"
          if [ ! -f "$src" ]; then
            echo "::error::XP LOL executable not found at $src"
            find AwakeGuard-xp-lol -name '*.exe' -o -name '*.EXE' || true
            exit 1
          fi
          mkdir -p artifacts
          cp -v "$src" artifacts/AwakeGuard-win32-x86-xp-lol.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AwakeGuard-win32-x86-xp-lol
          path: artifacts/AwakeGuard-win32-x86-xp-lol.exe
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # 3. 9x ROFLMAO (MinGW i686) — 32-bit only, for Windows 95 / 98 / ME (museum build).
  # Needs MSYS2 MinGW: -mcrtdll=msvcrt20 requires GCC 14+ (Ubuntu apt mingw is GCC 13).
  # ---------------------------------------------------------------------------
  build-9x-roflmao:
    name: 9x ROFLMAO (Win9x i686)
    needs: resolve-version
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSYS2 MinGW32
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW32
          update: true
          install: >-
            mingw-w64-i686-gcc
            mingw-w64-i686-cmake
            mingw-w64-i686-make
            python
            python-pillow

      - name: Generate XP/9x-compatible icons (BMP ICO, not PNG-in-ICO)
        run: python scripts/generate-icons.py

      - name: Configure and build
        working-directory: AwakeGuard-9x-roflmao
        env:
          AWAKEGUARD_VERSION: ${{ needs.resolve-version.outputs.semver }}
        run: |
          cmake -S . -B build -G "MinGW Makefiles" \
            -DCMAKE_TOOLCHAIN_FILE=cmake/mingw-i686-9x.cmake \
            -DAWAKEGUARD_VERSION="$AWAKEGUARD_VERSION"
          cmake --build build

      - name: Stage artifact
        run: |
          set -euo pipefail
          src="AwakeGuard-9x-roflmao/build/AwakeGuard-9x-ROFLMAO.exe"
          if [ ! -f "$src" ]; then
            echo "::error::9x ROFLMAO executable not found at $src"
            find AwakeGuard-9x-roflmao -name '*.exe' -o -name '*.EXE' || true
            exit 1
          fi
          mkdir -p artifacts
          cp -v "$src" artifacts/AwakeGuard-win32-x86-9x-roflmao.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AwakeGuard-win32-x86-9x-roflmao
          path: artifacts/AwakeGuard-win32-x86-9x-roflmao.exe
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # 4. WPF .NET 10 — framework-dependent. Matrix: x64/x86/arm64.
  # ---------------------------------------------------------------------------
  build-wpf-framework-dependent:
    name: WPF framework-dependent (${{ matrix.arch }})
    needs: resolve-version
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [x64, x86, arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Publish (framework-dependent, win-${{ matrix.arch }})
        working-directory: AwakeGuard
        run: >
          dotnet publish AwakeGuard.csproj
          -c Release
          -r win-${{ matrix.arch }}
          --self-contained false
          -p:PublishSingleFile=true
          -p:DebugType=embedded
          -p:AwakeGuardVersion=${{ needs.resolve-version.outputs.semver }}
          -p:Version=${{ needs.resolve-version.outputs.semver }}
          -o publish/fx-${{ matrix.arch }}

      - name: Package artifact
        shell: pwsh
        run: |
          $publishDir = "AwakeGuard/publish/fx-${{ matrix.arch }}"
          if (-not (Test-Path $publishDir)) { throw "Publish output missing at $publishDir" }
          # GPL-3.0 requires distributed copies ship with the license text.
          Copy-Item LICENSE (Join-Path $publishDir 'LICENSE') -Force
          New-Item -ItemType Directory -Path artifacts -Force | Out-Null
          $zip = "artifacts/AwakeGuard-wpf-framework-dependent-win-${{ matrix.arch }}.zip"
          Compress-Archive -Path "$publishDir/*" -DestinationPath $zip -Force
          Get-ChildItem artifacts | Format-Table -AutoSize

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AwakeGuard-wpf-framework-dependent-win-${{ matrix.arch }}
          path: artifacts/AwakeGuard-wpf-framework-dependent-win-${{ matrix.arch }}.zip
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # 5. WPF .NET 10 — self-contained single file. Matrix: x64/x86/arm64.
  # ---------------------------------------------------------------------------
  build-wpf-self-contained:
    name: WPF self-contained (${{ matrix.arch }})
    needs: resolve-version
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [x64, x86, arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Publish (self-contained, win-${{ matrix.arch }})
        working-directory: AwakeGuard
        run: >
          dotnet publish AwakeGuard.csproj
          -c Release
          -r win-${{ matrix.arch }}
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:EnableCompressionInSingleFile=true
          -p:DebugType=embedded
          -p:AwakeGuardVersion=${{ needs.resolve-version.outputs.semver }}
          -p:Version=${{ needs.resolve-version.outputs.semver }}
          -o publish/sc-${{ matrix.arch }}

      - name: Package artifact
        shell: pwsh
        run: |
          $publishDir = "AwakeGuard/publish/sc-${{ matrix.arch }}"
          if (-not (Test-Path $publishDir)) { throw "Publish output missing at $publishDir" }
          # GPL-3.0 requires distributed copies ship with the license text.
          Copy-Item LICENSE (Join-Path $publishDir 'LICENSE') -Force
          New-Item -ItemType Directory -Path artifacts -Force | Out-Null
          $zip = "artifacts/AwakeGuard-wpf-self-contained-win-${{ matrix.arch }}.zip"
          Compress-Archive -Path "$publishDir/*" -DestinationPath $zip -Force
          Get-ChildItem artifacts | Format-Table -AutoSize

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AwakeGuard-wpf-self-contained-win-${{ matrix.arch }}
          path: artifacts/AwakeGuard-wpf-self-contained-win-${{ matrix.arch }}.zip
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # 6. Publish a GitHub Release with all artifacts attached.
  # ---------------------------------------------------------------------------
  release:
    name: Publish GitHub Release
    needs:
      - resolve-version
      - build-win32
      - build-xp-lol
      - build-9x-roflmao
      - build-wpf-framework-dependent
      - build-wpf-self-contained
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout (for LICENSE)
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifact tree
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-files
          find artifacts -type f \( -name '*.exe' -o -name '*.zip' \) -exec cp -v {} release-files/ \;
          # Also attach the standalone LICENSE so anyone grabbing the .exe
          # variant from the release page has the GPL text right there.
          cp -v LICENSE release-files/LICENSE
          ls -la release-files

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve-version.outputs.tag }}
          name: AwakeGuard ${{ needs.resolve-version.outputs.semver }}
          generate_release_notes: true
          files: release-files/*
          draft: false
          prerelease: false
